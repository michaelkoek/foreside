syntax = "proto3";

package order;

service OrderService {
  rpc PlaceOrder(PlaceOrderRequest) returns (stream OrderEvent);
}

message OrderItem {
  int32 beer_id = 1;
  int32 quantity = 2;
}

message PlaceOrderRequest {
  repeated OrderItem items = 1;
  string correlation_id = 2;
}

message BeerReady {
  int32 beer_id = 1;
  string beer_name = 2;
  int32 quantity = 3;
}

message OrderComplete {
  string order_id = 1;
  repeated BeerReady beers = 2;
  int32 total_beers = 3;
}

message OrderEvent {
  oneof event {
    BeerReady beer_ready = 1;
    OrderComplete order_complete = 2;
  }
}
